<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VVV.SHOWCASE</title>
<style>
  :root {
    --bg0: #070912;
    --bg1: #0c1020;
    --glass: rgba(18, 24, 44, 0.55);
    --glass-strong: rgba(20, 28, 52, 0.78);
    --line: rgba(120, 180, 255, 0.16);
    --line-hot: rgba(0, 240, 255, 0.45);
    --cyan: #2bf5ff;
    --cyan-dim: #1ba6b8;
    --magenta: #ff3df0;
    --magenta-dim: #c12fb8;
    --violet: #8b7bff;
    --ink: #eaf2ff;
    --ink-soft: #9fb2d4;
    --ink-faint: #62739a;
    --radius: 12px;
    --font: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Roboto Mono", ui-monospace, "Courier New", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg0); }
  body {
    font-family: var(--font);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    position: relative;
  }

  /* ---- animated background ---- */
  #bgcanvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0; display: block;
  }
  .bg-veil {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(43,245,255,0.08), transparent 60%),
      radial-gradient(120% 90% at 90% 110%, rgba(255,61,240,0.08), transparent 55%),
      linear-gradient(180deg, rgba(7,9,18,0.2), rgba(7,9,18,0.78));
  }
  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: .35;
    background: repeating-linear-gradient(180deg, transparent 0 2px, rgba(0,0,0,0.18) 2px 3px);
    mix-blend-mode: multiply;
  }
  .app { position: relative; z-index: 3; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* ---- masthead ---- */
  header.masthead {
    position: sticky; top: 0; z-index: 20;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(7,9,18,0.85), rgba(7,9,18,0.45));
    backdrop-filter: blur(14px) saturate(1.3);
  }
  .masthead-inner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 18px 24px; max-width: 1100px; margin: 0 auto;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .glyph {
    width: 40px; height: 40px; flex-shrink: 0;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .glyph img {
    width: 38px; height: 38px; object-fit: contain;
    filter: drop-shadow(0 0 6px rgba(43,245,255,0.55)) drop-shadow(0 0 10px rgba(255,61,240,0.35));
  }
  .glyph svg { width: 22px; height: 22px; }
  .brand h1 {
    font-size: 22px; font-weight: 800; letter-spacing: 0.04em;
    color: var(--ink);
    text-shadow: 0 0 18px rgba(43,245,255,0.35);
  }
  .brand h1 .alt { color: var(--magenta); text-shadow: 0 0 18px rgba(255,61,240,0.45); }
  .brand .sub {
    display: block; font-family: var(--mono); font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.32em; color: var(--cyan); text-transform: uppercase; margin-top: 2px;
    text-shadow: 0 0 10px rgba(43,245,255,0.4);
  }
  .counter {
    font-family: var(--mono); font-size: 12px; color: var(--ink-soft);
    letter-spacing: 0.05em; white-space: nowrap;
    border: 1px solid var(--line); border-radius: 20px; padding: 6px 14px;
    background: rgba(0,0,0,0.25);
  }
  .counter b { color: var(--cyan); font-weight: 700; }

  main { padding: 30px 0 110px; }

  /* ---- toolbar ---- */
  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 26px; }
  .btn {
    font: inherit; font-weight: 700; font-size: 13.5px; letter-spacing: 0.02em;
    border: 1px solid var(--line); background: var(--glass);
    color: var(--ink); border-radius: 10px; padding: 10px 16px;
    cursor: pointer; transition: all .18s; display: inline-flex; align-items: center; gap: 8px;
    backdrop-filter: blur(8px);
  }
  .btn:hover { border-color: var(--line-hot); box-shadow: 0 0 16px rgba(43,245,255,0.18); }
  .btn:active { transform: scale(.97); }
  .btn svg { width: 16px; height: 16px; }
  .btn-primary {
    background: linear-gradient(135deg, rgba(43,245,255,0.18), rgba(139,123,255,0.18));
    border-color: var(--line-hot); color: var(--cyan);
    text-shadow: 0 0 10px rgba(43,245,255,0.4);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, rgba(43,245,255,0.3), rgba(255,61,240,0.22));
    box-shadow: 0 0 24px rgba(43,245,255,0.3);
  }

  .sort { display: flex; gap: 7px; align-items: center; font-size: 12.5px; color: var(--ink-faint); font-family: var(--mono); letter-spacing: 0.04em; }
  .sort select, .field select {
    font: inherit; font-size: 13px; font-weight: 600; color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 11px; background: var(--glass-strong); cursor: pointer;
    backdrop-filter: blur(8px);
  }
  .sort select option, .field select option { background: #0c1020; color: var(--ink); }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .chip {
    font: inherit; font-size: 12.5px; font-weight: 600; letter-spacing: 0.02em;
    border: 1px solid var(--line); background: rgba(0,0,0,0.2);
    color: var(--ink-soft); border-radius: 20px; padding: 7px 14px; cursor: pointer;
    transition: all .16s;
  }
  .chip:hover { border-color: var(--line-hot); color: var(--ink); }
  .chip.active {
    background: rgba(43,245,255,0.12); border-color: var(--cyan); color: var(--cyan);
    box-shadow: 0 0 14px rgba(43,245,255,0.22); text-shadow: 0 0 8px rgba(43,245,255,0.4);
  }

  /* ---- grid + cards ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 18px; }

  .card {
    position: relative;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: var(--radius);
    display: flex; flex-direction: column; overflow: hidden;
    transition: transform .2s, box-shadow .2s, border-color .2s;
    backdrop-filter: blur(10px) saturate(1.2);
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius);
    padding: 1px; pointer-events: none; opacity: 0; transition: opacity .25s;
    background: linear-gradient(135deg, var(--cyan), var(--magenta));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 28px rgba(43,245,255,0.12);
    border-color: transparent;
  }
  .card:hover::before { opacity: 1; }

  .card-top { padding: 18px 18px 0; display: flex; flex-direction: column; gap: 11px; flex: 1; }
  .card-author { display: flex; align-items: center; gap: 9px; }
  .avatar {
    width: 30px; height: 30px; border-radius: 8px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #050810; flex-shrink: 0;
    font-family: var(--mono);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .card-author .name { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .card-author .when {
    font-size: 11px; color: var(--ink-faint); margin-left: auto;
    font-family: var(--mono); letter-spacing: 0.03em; position: relative; cursor: default;
  }
  .card-author .when::after {
    content: attr(data-full);
    position: absolute; bottom: 140%; right: 0; white-space: nowrap;
    font-size: 10.5px; color: var(--cyan); letter-spacing: 0.04em;
    background: var(--glass-strong); border: 1px solid var(--line-hot);
    border-radius: 7px; padding: 5px 9px; pointer-events: none;
    opacity: 0; transform: translateY(3px); transition: opacity .15s, transform .15s;
    box-shadow: 0 0 16px rgba(43,245,255,0.2); z-index: 30;
    backdrop-filter: blur(10px);
  }
  .card-author .when:hover::after { opacity: 1; transform: translateY(0); }

  .card h3 { font-size: 17px; font-weight: 700; letter-spacing: 0.01em; line-height: 1.4; color: var(--ink); }
  .card .desc { font-size: 13px; color: var(--ink-soft); line-height: 1.55; }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag {
    font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
    color: var(--magenta); background: rgba(255,61,240,0.1);
    border: 1px solid rgba(255,61,240,0.25); border-radius: 5px; padding: 2px 8px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .tag.cat {
    color: var(--cyan); background: rgba(43,245,255,0.1); border-color: rgba(43,245,255,0.3);
  }
  .cat-edit {
    cursor: pointer; font: inherit;
    font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
    transition: all .15s;
  }
  .cat-edit:hover { box-shadow: 0 0 12px rgba(43,245,255,0.3); }
  .cat-caret { margin-left: 4px; opacity: .7; font-size: 8px; }
  .cat-menu {
    position: fixed; z-index: 60; min-width: 120px;
    background: var(--glass-strong); border: 1px solid var(--line-hot);
    border-radius: 10px; padding: 5px; backdrop-filter: blur(16px);
    box-shadow: 0 0 30px rgba(43,245,255,0.18), 0 12px 30px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; gap: 2px;
  }
  .cat-opt {
    font: inherit; font-family: var(--font); font-size: 13px; font-weight: 600;
    text-align: left; color: var(--ink-soft); background: transparent;
    border: none; border-radius: 7px; padding: 7px 11px; cursor: pointer; transition: all .12s;
  }
  .cat-opt:hover { background: rgba(43,245,255,0.1); color: var(--cyan); }
  .cat-opt.current { color: var(--cyan); }
  .cat-opt.current::after { content: ' ✓'; }

  .card-foot {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px; margin-top: 14px;
    border-top: 1px solid var(--line);
  }
  .like {
    display: inline-flex; align-items: center; gap: 6px;
    font: inherit; font-size: 13px; font-weight: 700; color: var(--ink-soft);
    background: rgba(0,0,0,0.2); border: 1px solid var(--line);
    border-radius: 18px; padding: 6px 13px; cursor: pointer; transition: all .16s;
    font-family: var(--mono);
  }
  .like:hover { border-color: var(--magenta); color: var(--magenta); }
  .like.liked {
    background: rgba(255,61,240,0.12); border-color: var(--magenta); color: var(--magenta);
    box-shadow: 0 0 12px rgba(255,61,240,0.25);
  }
  .like svg { width: 15px; height: 15px; }
  .open {
    margin-left: auto; display: inline-flex; align-items: center; gap: 6px;
    font: inherit; font-size: 13px; font-weight: 700; color: var(--cyan);
    text-decoration: none; transition: gap .16s, text-shadow .16s; letter-spacing: 0.02em;
  }
  .open:hover { gap: 9px; text-shadow: 0 0 10px rgba(43,245,255,0.5); }
  .open svg { width: 15px; height: 15px; }

  .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--ink-faint); }
  .empty svg { width: 46px; height: 46px; opacity: .5; margin-bottom: 16px; color: var(--cyan); }
  .empty h2 { font-size: 18px; font-weight: 700; color: var(--ink-soft); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  /* ---- modal ---- */
  .scrim {
    position: fixed; inset: 0; background: rgba(3,5,12,0.75);
    display: none; align-items: flex-start; justify-content: center;
    padding: 40px 20px; z-index: 50; overflow-y: auto;
    backdrop-filter: blur(6px);
  }
  .scrim.show { display: flex; }
  .modal {
    background: var(--glass-strong); border: 1px solid var(--line-hot);
    border-radius: 16px; width: 100%; max-width: 520px;
    box-shadow: 0 0 60px rgba(43,245,255,0.15), 0 24px 60px rgba(0,0,0,0.6);
    overflow: hidden; animation: rise .22s ease; backdrop-filter: blur(20px) saturate(1.3);
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .modal-head {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h2 {
    font-size: 18px; font-weight: 800; letter-spacing: 0.03em; color: var(--ink);
    text-shadow: 0 0 14px rgba(43,245,255,0.3);
  }
  .modal-head h2 .pre { font-family: var(--mono); color: var(--cyan); font-weight: 600; margin-right: 8px; }
  .x { background: none; border: none; cursor: pointer; color: var(--ink-faint); padding: 4px; line-height: 0; border-radius: 6px; transition: all .15s; }
  .x:hover { background: rgba(255,61,240,0.15); color: var(--magenta); }
  .x svg { width: 20px; height: 20px; }
  .modal-body { padding: 22px 24px; display: flex; flex-direction: column; gap: 15px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 700; color: var(--ink-soft); letter-spacing: 0.03em; text-transform: uppercase; font-family: var(--mono); }
  .field label .req { color: var(--magenta); }
  .field .hint { font-size: 11px; color: var(--ink-faint); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .field input, .field textarea {
    font: inherit; font-size: 14px; color: var(--ink);
    border: 1px solid var(--line); border-radius: 9px;
    padding: 10px 12px; background: rgba(0,0,0,0.3); transition: border-color .15s, box-shadow .15s;
    width: 100%;
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--ink-faint); }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(43,245,255,0.15), 0 0 16px rgba(43,245,255,0.15);
  }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .avatar-pick { display: flex; align-items: center; gap: 12px; }
  .avatar-prev {
    width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0; overflow: hidden;
    border: 1px solid var(--line-hot); background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-family: var(--mono); font-size: 20px; font-weight: 700;
    box-shadow: inset 0 0 12px rgba(43,245,255,0.1);
  }
  .avatar-prev img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-choose, .avatar-clear { padding: 8px 14px; font-size: 13px; }
  .avatar-clear { color: var(--magenta); border-color: rgba(255,61,240,0.3); }
  .avatar-clear:hover { border-color: var(--magenta); }
  .field .err { font-size: 11.5px; color: #ff6b8a; font-weight: 600; display: none; font-family: var(--mono); }
  .field.invalid input, .field.invalid textarea { border-color: #ff6b8a; }
  .field.invalid .err { display: block; }
  .modal-foot { padding: 16px 24px 22px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--line); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ---- toast ---- */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--glass-strong); color: var(--cyan); font-size: 13.5px; font-weight: 700;
    padding: 13px 22px; border-radius: 10px; opacity: 0; pointer-events: none;
    transition: all .26s; z-index: 100; display: flex; align-items: center; gap: 9px;
    border: 1px solid var(--line-hot); box-shadow: 0 0 26px rgba(43,245,255,0.25);
    backdrop-filter: blur(14px); font-family: var(--mono); letter-spacing: 0.02em;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 16px; height: 16px; }

  /* ---- bg switcher ---- */
  .bgswitch {
    position: fixed; right: 22px; bottom: 22px; z-index: 40;
    display: flex; gap: 5px; padding: 5px;
    background: var(--glass-strong); border: 1px solid var(--line);
    border-radius: 26px; backdrop-filter: blur(14px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .bgswitch button {
    font: inherit; font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.04em; color: var(--ink-faint);
    background: transparent; border: none; border-radius: 20px;
    padding: 7px 13px; cursor: pointer; transition: all .16s; display: flex; align-items: center; gap: 6px;
  }
  .bgswitch button svg { width: 14px; height: 14px; }
  .bgswitch button:hover { color: var(--ink-soft); }
  .bgswitch button.active {
    color: var(--cyan); background: rgba(43,245,255,0.12);
    text-shadow: 0 0 8px rgba(43,245,255,0.4);
  }

  .loading { grid-column: 1/-1; text-align: center; padding: 70px; color: var(--ink-faint); font-family: var(--mono); font-size: 13px; letter-spacing: 0.1em; }

  @media (max-width: 560px) {
    .filters { margin-left: 0; width: 100%; }
    .row2 { grid-template-columns: 1fr; }
    .sort { margin-left: 0; }
    .bgswitch button span { display: none; }
    .bgswitch button { padding: 8px; }
  }
  @media (prefers-reduced-motion: reduce) {
    #bgcanvas { display: none; }
  }
</style>
</head>
<body>

<canvas id="bgcanvas"></canvas>
<div class="bg-veil"></div>
<div class="scanlines"></div>

<div class="app">
<header class="masthead">

      <div class="field" id="f-url">

<script>
/* ============ animated background ============ */
const canvas = document.getElementById('bgcanvas');
const ctx = canvas.getContext('2d');
let W, H, DPR, mode = 'grid', t = 0, raf;
const CYAN = '43,245,255', MAG = '255,61,240', VIO = '139,123,255';

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = canvas.width = innerWidth * DPR;
  H = canvas.height = innerHeight * DPR;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  initParticles(); initRain();
}
window.addEventListener('resize', resize);

/* ---- particles ---- */
let parts = [];
function initParticles() {
  const n = Math.min(70, Math.floor((innerWidth * innerHeight) / 18000));
  parts = Array.from({length: n}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.25 * DPR,
    vy: (Math.random() - 0.5) * 0.25 * DPR,
    r: (Math.random() * 1.6 + 0.6) * DPR
  }));
}
function drawParticles() {
  ctx.clearRect(0, 0, W, H);
  const linkDist = 130 * DPR;
  for (const p of parts) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
  }
  for (let i = 0; i < parts.length; i++) {
    for (let j = i + 1; j < parts.length; j++) {
      const a = parts[i], b = parts[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = Math.hypot(dx, dy);
      if (d < linkDist) {
        const o = (1 - d / linkDist) * 0.5;
        const col = i % 3 === 0 ? MAG : CYAN;
        ctx.strokeStyle = `rgba(${col},${o})`;
        ctx.lineWidth = 0.6 * DPR;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
    }
  }
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    const col = i % 5 === 0 ? MAG : CYAN;
    ctx.fillStyle = `rgba(${col},0.9)`;
    ctx.shadowBlur = 8 * DPR; ctx.shadowColor = `rgba(${col},0.8)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

/* ---- grid (perspective floor) ---- */
function drawGrid() {
  ctx.clearRect(0, 0, W, H);
  const hz = H * 0.42;          // horizon
  const speed = (t * 0.4 * DPR) % (40 * DPR);
  ctx.lineWidth = 1 * DPR;
  // horizontal receding lines
  for (let i = 0; i < 26; i++) {
    const z = i / 26;
    const y = hz + Math.pow(z, 2.2) * (H - hz) + speed * (1 - z);
    if (y > H + 4 || y < hz) continue;
    const o = (1 - (y - hz) / (H - hz)) * 0.35 + 0.05;
    ctx.strokeStyle = `rgba(${CYAN},${o})`;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // vertical converging lines
  const cx = W / 2;
  for (let i = -16; i <= 16; i++) {
    const fx = cx + i * (W / 14);
    const o = Math.max(0, 0.28 - Math.abs(i) * 0.012);
    const col = i % 4 === 0 ? MAG : CYAN;
    ctx.strokeStyle = `rgba(${col},${o})`;
    ctx.beginPath(); ctx.moveTo(cx, hz); ctx.lineTo(fx, H); ctx.stroke();
  }
  // horizon glow
  const grad = ctx.createLinearGradient(0, hz - 60 * DPR, 0, hz + 30 * DPR);
  grad.addColorStop(0, 'rgba(7,9,18,0)');
  grad.addColorStop(1, `rgba(${VIO},0.12)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, hz - 60 * DPR, W, 90 * DPR);

  // ---- wireframe pyramid standing on the floor ----
  drawPyramid(cx, hz);
}

function drawPyramid(cx, hz) {
  const rot = t * 0.006;                 // slow auto-rotation
  const cosR = Math.cos(rot), sinR = Math.sin(rot);
  const S = Math.min(W * 0.20, 190 * DPR);   // base half-width (model units on floor)

  // Floor projection model:
  //   camera looks down at a floor. A floor point at depth d (>=0, farther = larger)
  //   and lateral x maps to screen with a vanishing point at the horizon (hz).
  //   screenScale shrinks toward the horizon as depth grows.
  const D0 = S * 6.0;                     // distance of pyramid center → pushed back near horizon
  const floorBottom = H * 1.15;           // depth=0 maps below screen bottom
  function projectFloor(x, z, yUp) {
    // depth from camera (center of pyramid sits at D0)
    const d = D0 + z;                      // z: +back/-front around center
    const persp = D0 / d;                  // 1 at center, <1 behind, >1 in front
    // vertical position of the floor point: interpolate horizon..bottom by persp
    const floorY = hz + (floorBottom - hz) * persp;
    const sx = cx + x * persp;
    const sy = floorY - yUp * persp;       // yUp lifts the apex above the floor
    return [sx, sy, z];
  }

  // square base on the floor (yUp = 0), apex lifted
  const base = [
    [-S, -S], [S, -S], [S, S], [-S, S]    // (x, z) pairs
  ];
  const pb = base.map(([bx, bz]) => {
    const rx = bx * cosR - bz * sinR;
    const rz = bx * sinR + bz * cosR;
    return projectFloor(rx, rz, 0);
  });
  // apex: lock the tip exactly to the horizon line (grid's vanishing point),
  // so the pyramid's top sits where the floor grid starts.
  const pa = [cx, hz, 0];

  // base edges — back first (dimmer), front brighter
  for (let i = 0; i < 4; i++) {
    const a = pb[i], b = pb[(i + 1) % 4];
    const front = (a[2] + b[2]) / 2 < 0;
    const o = front ? 0.55 : 0.18;
    const col = i % 2 === 0 ? CYAN : MAG;
    ctx.strokeStyle = `rgba(${col},${o})`;
    ctx.lineWidth = (front ? 1.8 : 1) * DPR;
    ctx.shadowBlur = (front ? 10 : 3) * DPR; ctx.shadowColor = `rgba(${col},0.7)`;
    ctx.beginPath(); ctx.moveTo(a[0], a[1]); ctx.lineTo(b[0], b[1]); ctx.stroke();
  }
  // edges to apex
  for (let i = 0; i < 4; i++) {
    const a = pb[i];
    const front = a[2] < 0;
    const o = front ? 0.62 : 0.22;
    ctx.strokeStyle = `rgba(${CYAN},${o})`;
    ctx.lineWidth = (front ? 1.8 : 1) * DPR;
    ctx.shadowBlur = (front ? 12 : 3) * DPR; ctx.shadowColor = `rgba(${CYAN},0.8)`;
    ctx.beginPath(); ctx.moveTo(a[0], a[1]); ctx.lineTo(pa[0], pa[1]); ctx.stroke();
  }
  // grid texture on front faces
  for (let i = 0; i < 4; i++) {
    const a = pb[i], b = pb[(i + 1) % 4];
    if ((a[2] + b[2]) / 2 >= 0) continue;
    for (let k = 1; k < 5; k++) {
      const f = k / 5;
      const ax = a[0] + (pa[0] - a[0]) * f, ay = a[1] + (pa[1] - a[1]) * f;
      const bx = b[0] + (pa[0] - b[0]) * f, by = b[1] + (pa[1] - b[1]) * f;
      ctx.strokeStyle = `rgba(${CYAN},${0.16 * (1 - f)})`;
      ctx.lineWidth = 0.8 * DPR; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    }
  }
  // apex glow
  ctx.fillStyle = `rgba(${CYAN},0.9)`;
  ctx.shadowBlur = 18 * DPR; ctx.shadowColor = `rgba(${CYAN},1)`;
  ctx.beginPath(); ctx.arc(pa[0], pa[1], 2.5 * DPR, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

/* ---- digital rain ---- */
let drops = [], fontSize;
const GLYPHS = 'ｱｲｳｴｵｶｷｸｹｺｻ01ｼｽｾﾀﾁﾂ10ﾃﾄﾅﾆ01ﾇﾈﾉﾊ#%01';
function initRain() {
  fontSize = 15 * DPR;
  const cols = Math.floor(W / fontSize);
  drops = Array.from({length: cols}, () => ({
    y: Math.random() * -H, speed: (Math.random() * 0.5 + 0.5) * 2.2 * DPR
  }));
}
function drawRain() {
  ctx.fillStyle = 'rgba(7,9,18,0.18)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${fontSize}px monospace`;
  ctx.textAlign = 'center';
  for (let i = 0; i < drops.length; i++) {
    const d = drops[i];
    const x = i * fontSize + fontSize / 2;
    const ch = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
    const col = i % 9 === 0 ? MAG : CYAN;
    // head bright
    ctx.fillStyle = `rgba(255,255,255,0.9)`;
    ctx.shadowBlur = 10 * DPR; ctx.shadowColor = `rgba(${col},0.9)`;
    ctx.fillText(ch, x, d.y);
    ctx.shadowBlur = 0;
    // trailing
    ctx.fillStyle = `rgba(${col},0.35)`;
    ctx.fillText(GLYPHS[Math.floor(Math.random()*GLYPHS.length)], x, d.y - fontSize);
    d.y += d.speed;
    if (d.y > H && Math.random() > 0.975) d.y = Math.random() * -100 * DPR;
  }
}

function loop() {
  t++;
  if (mode === 'particles') drawParticles();
  else if (mode === 'grid') drawGrid();
  else if (mode === 'rain') drawRain();
  raf = requestAnimationFrame(loop);
}

function setMode(m) {
  mode = m;
  ctx.clearRect(0, 0, W, H);
  document.querySelectorAll('.bgswitch button').forEach(b =>
    b.classList.toggle('active', b.dataset.bg === m));
  try { localStorage.setItem('cs_bg', m); } catch {}
}
document.querySelectorAll('.bgswitch button').forEach(b =>
  b.addEventListener('click', () => setMode(b.dataset.bg)));

/* ============ data + UI ============ */

/* ▼▼▼ ここだけ設定すれば公開時に GAS バックエンドへ切り替わる ▼▼▼
   ・API_URL を空のままにすると、この Artifact 内のローカル共有ストレージで動く（動作確認用）。
   ・GAS をデプロイして得た /exec の URL を API_URL に貼り、
     GAS 側の WRITE_TOKEN と同じ文字列を下の WRITE_TOKEN に入れると、
     投稿がスプレッドシートに保存・共有される。 */
const API_URL = 'https://script.google.com/macros/s/AKfycbxucw_YfSB4N_ZOJ82JtMLQsaj1SGqjQDhyeMGAIT1_qaXhEDScUgNki21g1es9_A0Qhw/exec';
const WRITE_TOKEN = 'vvv-show-7h3k9q2x';
const USE_GAS = API_URL.trim().length > 0;
/* ▲▲▲ 設定ここまで ▲▲▲ */

const KEY = 'canvas_showcase_posts';
const AVATAR_COLORS = ['#2bf5ff','#ff3df0','#8b7bff','#3df0a0','#ffb13d','#ff6b8a','#5ad1ff','#c77bff'];
const CATS = ['ツール','ゲーム','可視化','学習','アート','その他'];

let posts = [];
let likedIds = loadLiked();
let activeFilter = 'all';
let activeSort = 'new';

function loadLiked() {
  try { return new Set(JSON.parse(localStorage.getItem('cs_liked') || '[]')); }
  catch { return new Set(); }
}
function saveLiked() { try { localStorage.setItem('cs_liked', JSON.stringify([...likedIds])); } catch {} }

/* ---- GAS API クライアント ---- */
async function apiGet() {
  const res = await fetch(API_URL, { method: 'GET' });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'load failed');
  return data.posts;
}
async function apiPost(payload) {
  // GAS は OPTIONS プリフライトに応答できないため text/plain で送る
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ ...payload, token: WRITE_TOKEN })
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'request failed');
  return data;
}

/* ---- データ読み込み（両対応） ---- */
async function loadPosts() {
  if (USE_GAS) {
    try { posts = await apiGet(); }
    catch (e) { console.error(e); posts = []; showToast('読み込みに失敗しました'); }
  } else {
    try {
      const res = await window.storage.get(KEY, true);
      posts = res ? JSON.parse(res.value) : [];
    } catch { posts = []; }
  }
  if (!Array.isArray(posts)) posts = [];
}
/* ローカルモードのときだけ全体を書き戻す。GAS モードでは個別 API を使うので何もしない */
async function savePosts() {
  if (USE_GAS) return;
  try { await window.storage.set(KEY, JSON.stringify(posts), true); }
  catch (e) { console.error('save failed', e); }
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'NOW';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  if (s < 604800) return Math.floor(s/86400) + 'd';
  return new Date(ts).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
}
function fullTime(ts) {
  return new Date(ts).toLocaleString('ja-JP', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}
function colorFor(name) {
  let h = 0; for (let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function esc(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render() {
  const grid = document.getElementById('grid');
  let list = posts.slice();
  if (activeFilter !== 'all') list = list.filter(p => p.cat === activeFilter);
  list.sort((a,b) => activeSort === 'likes' ? (b.likes - a.likes) || (b.ts - a.ts) : b.ts - a.ts);

  document.getElementById('counter').innerHTML = `<b>${posts.length}</b> WORKS`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
      <h2>${posts.length ? 'この絞り込みに作品はありません' : 'まだ作品がありません'}</h2>
      <p>${posts.length ? '別のカテゴリを選んでみてください' : '最初の作品を投稿してみましょう'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const liked = likedIds.has(p.id);
    return `<article class="card">
      <div class="card-top">
        <div class="card-author">
          <div class="avatar"${p.avatar ? '' : ` style="background:${colorFor(p.author)}"`}>${p.avatar ? `<img src="${esc(p.avatar)}" alt="">` : esc(p.author.charAt(0).toUpperCase())}</div>
          <span class="name">${esc(p.author)}</span>
          <span class="when" data-full="${fullTime(p.ts)}">${timeAgo(p.ts)}</span>
        </div>
        <h3>${esc(p.title)}</h3>
        ${p.desc ? `<p class="desc">${esc(p.desc)}</p>` : ''}
        <div class="tags">
          <button class="tag cat cat-edit" data-id="${p.id}" title="カテゴリを変更">${esc(p.cat)}<span class="cat-caret">▾</span></button>
        </div>
      </div>
      <div class="card-foot">
        <button class="like ${liked?'liked':''}" data-id="${p.id}" aria-label="いいね">
          <svg viewBox="0 0 24 24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21l7.8-7.5 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg>
          ${p.likes}
        </button>
        <a class="open" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer">
          OPEN
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </article>`;
  }).join('');

  grid.querySelectorAll('.like').forEach(btn => btn.addEventListener('click', () => toggleLike(btn.dataset.id)));
  grid.querySelectorAll('.cat-edit').forEach(btn => btn.addEventListener('click', e => openCatMenu(e.currentTarget, btn.dataset.id)));
}

function openCatMenu(anchor, id) {
  closeCatMenu();
  const p = posts.find(x => x.id === id);
  if (!p) return;
  const menu = document.createElement('div');
  menu.className = 'cat-menu';
  menu.innerHTML = CATS.map(c =>
    `<button class="cat-opt ${c===p.cat?'current':''}" data-c="${c}">${c}</button>`
  ).join('');
  document.body.appendChild(menu);
  const r = anchor.getBoundingClientRect();
  menu.style.left = Math.min(r.left, innerWidth - menu.offsetWidth - 12) + 'px';
  menu.style.top = (r.bottom + 6) + 'px';
  menu.querySelectorAll('.cat-opt').forEach(opt => opt.addEventListener('click', async () => {
    p.cat = opt.dataset.c;
    closeCatMenu();
    render();
    if (USE_GAS) { try { await apiSetCategory(id, p.cat); } catch (e) { console.error(e); } }
    else { await savePosts(); }
    showToast('カテゴリを変更しました');
  }));
  setTimeout(() => document.addEventListener('click', catOutside), 0);
}
function catOutside(e) {
  if (!e.target.closest('.cat-menu') && !e.target.closest('.cat-edit')) closeCatMenu();
}
function closeCatMenu() {
  document.querySelectorAll('.cat-menu').forEach(m => m.remove());
  document.removeEventListener('click', catOutside);
}

function renderFilters() {
  const el = document.getElementById('filters');
  const all = [{k:'all',l:'すべて'}, ...CATS.map(c=>({k:c,l:c}))];
  el.innerHTML = all.map(f => `<button class="chip ${activeFilter===f.k?'active':''}" data-k="${f.k}">${f.l}</button>`).join('');
  el.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
    activeFilter = c.dataset.k; renderFilters(); render();
  }));
}

async function toggleLike(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  const delta = likedIds.has(id) ? -1 : 1;
  if (delta < 0) likedIds.delete(id); else likedIds.add(id);
  p.likes = Math.max(0, (p.likes || 0) + delta);
  saveLiked(); render();
  if (USE_GAS) {
    try { await apiLike(id, delta); } catch (e) { console.error(e); }
  } else {
    await savePosts();
  }
}
function apiLike(id, delta) { return apiPost({ action: 'like', id, delta }); }
function apiSetCategory(id, cat) { return apiPost({ action: 'setCategory', id, cat }); }
function apiCreate(post) { return apiPost({ action: 'create', post }); }

const scrim = document.getElementById('scrim');

/* ---- avatar image picking (resize to a small square data URL) ---- */
let pickedAvatar = null;     // data URL or null
function resizeToDataURL(file, size = 96) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const cx2 = c.getContext('2d');
      // cover-crop to square
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
      cx2.drawImage(img, sx, sy, s, s, 0, 0, size, size);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('image load failed')); };
    img.src = url;
  });
}
function setAvatarPreview(dataUrl) {
  const prev = document.getElementById('avatarPrev');
  const clearBtn = document.getElementById('avatarClear');
  if (dataUrl) {
    prev.innerHTML = `<img src="${dataUrl}" alt="">`;
    clearBtn.hidden = false;
  } else {
    prev.innerHTML = `<span id="avatarPrevTxt">?</span>`;
    clearBtn.hidden = true;
  }
}
document.getElementById('avatarChoose').addEventListener('click', () => document.getElementById('i-avatar').click());
document.getElementById('i-avatar').addEventListener('change', async e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  try {
    pickedAvatar = await resizeToDataURL(file, 96);
    setAvatarPreview(pickedAvatar);
  } catch { showToast('画像を読み込めませんでした'); }
});
document.getElementById('avatarClear').addEventListener('click', () => {
  pickedAvatar = null;
  document.getElementById('i-avatar').value = '';
  setAvatarPreview(null);
});

function openModal() { scrim.classList.add('show'); document.getElementById('i-title').focus(); }
function closeModal() {
  scrim.classList.remove('show');
  ['title','url','author','desc'].forEach(k => document.getElementById('i-'+k).value='');
  document.getElementById('i-cat').selectedIndex = 0;
  ['f-title','f-url','f-author'].forEach(k => document.getElementById(k).classList.remove('invalid'));
  pickedAvatar = null;
  document.getElementById('i-avatar').value = '';
  setAvatarPreview(null);
}
document.getElementById('addBtn').addEventListener('click', openModal);
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
scrim.addEventListener('click', e => { if (e.target === scrim) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && scrim.classList.contains('show')) closeModal(); });

function validUrl(s) {
  try { const u = new URL(s); return u.protocol === 'http:' || u.protocol === 'https:'; }
  catch { return false; }
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  const title = document.getElementById('i-title').value.trim();
  const url = document.getElementById('i-url').value.trim();
  const author = document.getElementById('i-author').value.trim();
  const desc = document.getElementById('i-desc').value.trim();
  const cat = document.getElementById('i-cat').value;

  let ok = true;
  const setInvalid = (id, bad) => { document.getElementById(id).classList.toggle('invalid', bad); if (bad) ok=false; };
  setInvalid('f-title', !title);
  setInvalid('f-url', !validUrl(url));
  setInvalid('f-author', !author);
  if (!ok) return;

  const post = {
    id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    title, url, author, desc, cat, avatar: pickedAvatar || null, likes: 0, ts: Date.now()
  };

  if (USE_GAS) {
    document.getElementById('submitBtn').disabled = true;
    try {
      const r = await apiCreate(post);
      if (r.id) post.id = r.id;
      if (r.ts) post.ts = r.ts;
      posts.push(post);
      closeModal(); render(); showToast('投稿しました');
    } catch (e) {
      console.error(e); showToast('投稿に失敗しました');
    } finally {
      document.getElementById('submitBtn').disabled = false;
    }
  } else {
    posts.push(post);
    await savePosts(); closeModal(); render(); showToast('投稿しました');
  }
});

document.getElementById('sortSel').addEventListener('change', e => { activeSort = e.target.value; render(); });

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

(async function init() {
  resize();
  try { const saved = localStorage.getItem('cs_bg'); if (saved && ['grid','particles','rain'].includes(saved)) setMode(saved); } catch {}
  loop();
  renderFilters();
  await loadPosts();
  render();
})();
</script>
